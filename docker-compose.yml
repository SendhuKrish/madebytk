services:
  toto-engine:
    build: .
    container_name: toto-engine
    restart: always
    env_file:
      - path: .env.secret
        required: true
      - path: .env.config
        required: false
    ports:
      - "127.0.0.1:8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
