<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toto Prediction — MadeByTK</title>
    <meta name="description" content="Track Singapore Toto predictions, bets placed, and draw results with smart match highlighting.">
    <link rel="canonical" href="https://madebytk.com/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- No external SDKs — all data via /api/ backend -->
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f5f0;
            --bg-card: #ffffff;
            --border: #e5e5dd;
            --border-light: #eeeeea;
            --text: #1a1a1a;
            --text-dim: #666666;
            --text-muted: #999999;
            --green: #22c55e;
            --green-bg: #dcfce7;
            --green-dark: #16a34a;
            --amber: #f59e0b;
            --amber-bg: #fef3c7;
            --red: #ef4444;
            --accent: #4f46e5;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.6;
        }

        /* ── Header ── */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: .8rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .header h1 {
            font-size: 1.2rem; font-weight: 800;
        }
        .legend { display: flex; align-items: center; gap: 1rem; font-size: .75rem; color: var(--text-dim); }
        .legend-item { display: flex; align-items: center; gap: .3rem; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.match { background: var(--green); }
        .legend-dot.bonus { background: var(--amber); }
        .legend-dot.near { border: 1.5px dashed var(--green); background: transparent; }
        .header-right { display: flex; align-items: center; gap: .75rem; }
        .btn-sm {
            padding: .35rem .8rem; border-radius: 6px; font-size: .78rem;
            font-weight: 600; cursor: pointer; border: none; transition: all .15s;
        }
        .btn-admin { background: var(--accent); color: #fff; }
        .btn-admin:hover { opacity: .9; }
        .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-logout { background: var(--red); color: #fff; }

        /* ── Container ── */
        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }

        /* ── Draw Card ── */
        .draw-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .draw-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: .8rem 1.2rem;
            cursor: pointer; user-select: none;
            transition: background .15s;
        }
        .draw-header:hover { background: #fafaf7; }
        .draw-left { display: flex; align-items: center; gap: .8rem; flex-wrap: wrap; }
        .draw-date {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700; font-size: .88rem;
            min-width: 140px;
        }
        .draw-num {
            font-size: .72rem; color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .draw-center { flex: 1; text-align: center; }
        .jackpot-badge {
            font-size: .7rem; font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            padding: .15rem .5rem; border-radius: 4px;
        }
        .jackpot-badge.prize { color: var(--green-dark); background: var(--green-bg); }
        .jackpot-badge.est { color: #b45309; background: var(--amber-bg); }
        .winning-row { display: flex; align-items: center; gap: .3rem; }
        .ball {
            width: 32px; height: 32px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600; font-size: .78rem;
            background: #f0f0eb; border: 1.5px solid var(--border);
            color: var(--text);
        }
        .ball.win { background: var(--green); border-color: var(--green-dark); color: #fff; }
        .ball.bonus-ball { background: var(--amber); border-color: #d97706; color: #fff; }
        .ball.match { background: var(--green); border-color: var(--green-dark); color: #fff; }
        .ball.bonus-match { background: var(--amber); border-color: #d97706; color: #fff; }
        .ball.near { border: 2px dashed var(--green); background: transparent; color: var(--text); }
        .plus-sign { color: var(--text-muted); font-size: .8rem; font-weight: 600; }
        .draw-right { display: flex; align-items: center; gap: .8rem; }
        .draw-stats-text {
            font-size: .75rem; color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .match-count {
            width: 28px; height: 28px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: .8rem; color: #fff;
        }
        .match-count.green { background: var(--green); }
        .match-count.amber { background: var(--amber); }
        .match-count.gray { background: #ccc; }
        .chevron { color: var(--text-muted); transition: transform .2s; font-size: .9rem; }
        .draw-card.open .chevron { transform: rotate(180deg); }
        .draw-body { display: none; padding: 0 1.2rem 1.2rem; }
        .draw-card.open .draw-body { display: block; }

        /* ── Three columns: predictions, bets, results ── */
        .draw-columns {
            display: grid; grid-template-columns: 1fr 1fr auto; gap: 1.5rem;
            border-top: 1px solid var(--border-light);
            padding-top: 1rem;
        }
        .draw-col h4 {
            font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
            color: var(--text-muted); font-weight: 700; margin-bottom: .6rem;
        }
        .line-row {
            display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem;
        }
        .line-num {
            font-size: .72rem; font-weight: 700; color: var(--text-muted);
            min-width: 16px; text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }
        .line-balls { display: flex; gap: .25rem; align-items: center; }
        .line-match {
            font-size: .72rem; color: var(--text-muted); margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
        }
        .bet-type-tag {
            font-size: .6rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .04em; padding: .1rem .35rem; border-radius: 3px;
            color: var(--green-dark); background: var(--green-bg);
        }
        .no-data { color: var(--text-muted); font-size: .8rem; font-style: italic; padding: .5rem 0; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }

        /* ── Winning Shares Column ── */
        .results-col {
            min-width: 200px;
            padding: .5rem .8rem;
            background: #fafaf7;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }
        .results-col h4 {
            font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
            color: var(--text-muted); font-weight: 700; margin-bottom: .5rem;
        }
        .results-stat {
            display: flex; align-items: center; gap: .5rem;
            padding: .25rem 0; font-size: .72rem; color: var(--text-dim);
            border-bottom: 1px solid var(--border-light);
            font-family: 'JetBrains Mono', monospace;
        }
        .results-stat:last-child { border-bottom: none; }
        .results-stat .label { color: var(--text-muted); min-width: 40px; }
        .results-stat .value { font-weight: 600; min-width: 70px; text-align: right; }
        .results-stat .winners { color: var(--text-muted); font-size: .68rem; margin-left: auto; }

        /* ── Prize Table ── */
        .prize-section {
            border-top: 1px solid var(--border-light);
            padding: .8rem 0;
        }
        .prize-section h4 {
            font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
            color: var(--text-muted); font-weight: 700; margin-bottom: .5rem;
        }
        .prize-jackpot {
            font-size: .82rem; font-weight: 700; color: var(--green-dark);
            margin-bottom: .5rem;
        }
        .prize-table {
            width: 100%; max-width: 420px; border-collapse: collapse;
            font-size: .75rem; font-family: 'JetBrains Mono', monospace;
        }
        .prize-table th {
            text-align: left; padding: .25rem .5rem; color: var(--text-muted);
            font-weight: 600; border-bottom: 1px solid var(--border);
        }
        .prize-table td {
            padding: .2rem .5rem; color: var(--text-dim);
        }
        .prize-table tr:nth-child(even) { background: #fafaf7; }

        /* ── Loading ── */
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: .5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-bar { text-align: center; padding: 2rem; color: var(--text-dim); font-size: .9rem; }

        /* ── Login ── */
        .login-overlay {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        .login-overlay.show { display: flex; }
        .login-box {
            background: var(--bg-card); border-radius: 12px; padding: 2rem;
            width: 90%; max-width: 380px; position: relative;
        }
        .login-box h2 { font-size: 1.1rem; margin-bottom: .3rem; }
        .login-box .sub { font-size: .82rem; color: var(--text-dim); margin-bottom: 1.2rem; }
        .login-field {
            width: 100%; padding: .6rem .8rem; margin-bottom: .6rem;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: .88rem; background: var(--bg);
        }
        .login-submit {
            width: 100%; padding: .6rem; border-radius: 8px;
            background: var(--accent); color: #fff; font-weight: 700;
            font-size: .9rem; border: none; cursor: pointer;
        }
        .login-error { color: var(--red); font-size: .8rem; margin-top: .5rem; display: none; }
        .login-close {
            position: absolute; top: .8rem; right: .8rem;
            background: none; border: none; color: var(--text-dim);
            font-size: 1.3rem; cursor: pointer;
        }

        /* ── Admin Panel ── */
        .admin-panel { display: none; max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
        .admin-panel.active { display: block; }
        .admin-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem;
        }
        .admin-section h3 { font-size: .95rem; font-weight: 700; margin-bottom: .8rem; }
        .upload-zone {
            border: 2px dashed var(--border); border-radius: 10px;
            padding: 2rem; text-align: center; cursor: pointer; transition: all .2s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(79,70,229,.03); }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-zone .icon { font-size: 2rem; margin-bottom: .5rem; }
        .upload-zone p { color: var(--text-dim); font-size: .85rem; }
        .upload-zone .hint { font-size: .75rem; color: var(--text-muted); margin-top: .3rem; }
        .upload-preview { display: none; margin-top: 1rem; text-align: center; }
        .upload-preview img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid var(--border); }
        .extracted-bets { display: none; margin-top: 1rem; padding: 1rem; background: var(--green-bg); border-radius: 8px; }
        .extracted-bets h4 { color: var(--green-dark); font-size: .85rem; margin-bottom: .5rem; }
        .extracted-bet-item { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; }
        .bet-actions { display: flex; gap: .3rem; margin-left: auto; }
        .bet-btn { background: none; border: none; cursor: pointer; font-size: .75rem; padding: .15rem .4rem; border-radius: 4px; color: var(--text-muted); }
        .bet-btn:hover { background: #e5e5dd; color: var(--text); }
        .bet-btn.del:hover { background: #fee2e2; color: var(--red); }
        .bet-edit-row { display: flex; align-items: center; gap: .4rem; margin-bottom: .4rem; flex-wrap: wrap; }
        .bet-edit-row input { width: 38px; text-align: center; padding: .2rem; border: 1.5px solid var(--border); border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: .8rem; }
        .bet-edit-row input:focus { border-color: var(--accent); outline: none; }
        .bet-edit-row select { padding: .2rem .3rem; border: 1.5px solid var(--border); border-radius: 4px; font-size: .75rem; }
        .bet-edit-row .bet-btn.save { color: var(--green-dark); }
        .bet-edit-row .bet-btn.save:hover { background: var(--green-bg); }
        .btn { padding: .5rem 1rem; border-radius: 8px; font-weight: 600; font-size: .85rem; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-outline-sm { padding: .35rem .8rem; border-radius: 6px; font-size: .78rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-outline-sm:hover { border-color: var(--accent); color: var(--accent); }
        .btn-row { display: flex; gap: .5rem; margin-top: .8rem; flex-wrap: wrap; }
        .status-msg { font-size: .82rem; padding: .5rem .8rem; border-radius: 6px; margin-top: .5rem; display: none; }
        .status-msg.success { display: block; background: var(--green-bg); color: var(--green-dark); }
        .status-msg.error { display: block; background: #fee2e2; color: var(--red); }
        .status-msg.loading { display: block; background: #eff6ff; color: #2563eb; }

        footer {
            text-align: center; padding: 2rem 1rem;
            border-top: 1px solid var(--border);
        }
        footer p { color: var(--text-muted); font-size: .78rem; }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 768px) {
            .draw-columns { grid-template-columns: 1fr; }
            .results-col { order: -1; }
            .winning-row { display: none; }
            .legend { display: none; }
            .draw-date { min-width: auto; }
            .jackpot-badge { font-size: .65rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>Toto Prediction</h1>
            <div class="legend">
                <span class="legend-item"><span class="legend-dot match"></span> Match</span>
                <span class="legend-item"><span class="legend-dot bonus"></span> Bonus</span>
                <span class="legend-item"><span class="legend-dot near"></span> ±1</span>
            </div>
        </div>
        <div class="header-right" id="navRight">
            <button class="btn-sm btn-admin" id="adminLoginBtn">Admin</button>
        </div>
    </div>

    <!-- LOGIN -->
    <div class="login-overlay" id="loginOverlay">
        <button class="login-close" id="loginClose">&times;</button>
        <div class="login-box">
            <h2>Admin Login</h2>
            <p class="sub">Sign in to manage draws</p>
            <input type="email" class="login-field" id="loginEmail" placeholder="Email" autocomplete="email">
            <input type="password" class="login-field" id="loginPass" placeholder="Password" autocomplete="current-password">
            <button class="login-submit" id="loginSubmit">Login</button>
            <p class="login-error" id="loginError"></p>
        </div>
    </div>

    <!-- PUBLIC VIEW -->
    <div id="publicView">
        <div class="container" id="drawList">
            <div class="loading-bar"><span class="spinner"></span> Loading draws...</div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-panel" id="adminPanel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <h2 style="margin:0;font-size:1.2rem;font-weight:800;">Admin Panel</h2>
            <div style="display:flex;gap:.5rem;">
                <button class="btn-sm btn-ghost" id="backToPublic">Back</button>
                <button class="btn-sm btn-ghost" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="admin-section">
            <h3>Upload Bet Slip</h3>
            <div class="upload-zone" id="uploadZone">
                <input type="file" accept="image/*" id="betImageInput">
                <div class="icon">📸</div>
                <p>Drop bet slip image here or click to upload</p>
                <p class="hint">Supports ordinary bets, System 7, 8, 9, 10, 11, 12</p>
            </div>
            <div class="upload-preview" id="uploadPreview">
                <img id="previewImg" src="" alt="Bet slip preview">
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="extractBetsBtn" style="display:none;">Extract Bets with Claude</button>
            </div>
            <div class="status-msg" id="ocrStatus"></div>
            <div class="extracted-bets" id="extractedBets">
                <h4>Extracted Data</h4>
                <div id="extractedInfo"></div>
                <div id="extractedList"></div>
            </div>
            <div class="btn-row" style="margin-top:1rem;">
                <button class="btn btn-success" id="saveDraw" style="display:none;">Save Draw</button>
                <button class="btn btn-danger" id="deleteDraw" style="display:none;">Delete Draw</button>
                <button class="btn-outline-sm" id="clearForm">Clear</button>
            </div>
            <div class="status-msg" id="saveStatus"></div>
        </div>

        <div class="admin-section">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;">
                <h3 style="margin:0;">All Draws</h3>
                <button class="btn-outline-sm" id="fetchAllResults">Fetch Missing Results</button>
            </div>
            <div class="status-msg" id="fetchResultsStatus"></div>
            <div id="adminDrawList"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <a href="https://madebytk.com">madebytk.com</a> · <a href="https://curiouscabinet.tools" target="_blank">CuriousCabinet.tools</a></p>
    </footer>

    <script>
    (function() {
        const API = '/api';
        const $ = id => document.getElementById(id);

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-SG', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        function isNear(n, winning) {
            return winning.some(w => Math.abs(n - w) === 1 && n !== w);
        }

        function countMatches(betNumbers, winning, additional) {
            const winSet = new Set(winning);
            let mainMatch = 0, addMatch = false;
            betNumbers.forEach(n => {
                if (winSet.has(n)) mainMatch++;
                if (n === additional) addMatch = true;
            });
            return { mainMatch, addMatch };
        }

        function showStatus(id, type, msg) {
            const el = $(id);
            el.className = 'status-msg ' + type;
            el.textContent = msg;
        }
        function hideStatus(id) {
            const el = $(id);
            el.className = 'status-msg';
            el.style.display = 'none';
        }

        /* ── DATA (all via backend API) ── */
        async function fetchDraws() {
            try {
                const resp = await fetch(`${API}/draws`);
                if (resp.ok) return await resp.json();
            } catch (e) {
                console.error('Fetch draws failed:', e);
            }
            return [];
        }

        async function saveDraw(draw) {
            const resp = await fetch(`${API}/draws`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(draw),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.detail || 'Save failed');
            }
            return await resp.json();
        }

        async function deleteDraw(id) {
            const resp = await fetch(`${API}/draws/${id}`, { method: 'DELETE' });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.detail || 'Delete failed');
            }
        }

        /* ── RENDER PUBLIC ── */
        async function renderPublicDraws() {
            const container = $('drawList');
            container.innerHTML = '<div class="loading-bar"><span class="spinner"></span> Loading draws...</div>';
            const draws = await fetchDraws();

            if (draws.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No draws yet.</p></div>';
                return;
            }

            container.innerHTML = draws.map((draw, i) => {
                const hasResults = draw.results && draw.results.winning && draw.results.winning.length > 0;
                const hasBets = draw.bets && draw.bets.length > 0;
                const hasPreds = draw.predictions && draw.predictions.length > 0;

                let bestBetMatch = 0;
                let bestPredMatch = 0;
                if (hasResults && hasBets) {
                    draw.bets.forEach(bet => {
                        const { mainMatch } = countMatches(bet.numbers, draw.results.winning, draw.results.additional);
                        if (mainMatch > bestBetMatch) bestBetMatch = mainMatch;
                    });
                }
                if (hasResults && hasPreds) {
                    draw.predictions.forEach(pred => {
                        const nums = Array.isArray(pred) ? pred : (pred.numbers || []);
                        const { mainMatch } = countMatches(nums, draw.results.winning, draw.results.additional);
                        if (mainMatch > bestPredMatch) bestPredMatch = mainMatch;
                    });
                }

                const statsText = `${(draw.bets||[]).length}b`;
                const betMatchColor = bestBetMatch >= 3 ? 'green' : bestBetMatch > 0 ? 'amber' : 'gray';
                const predMatchColor = bestPredMatch >= 3 ? 'green' : bestPredMatch > 0 ? 'amber' : 'gray';

                // Jackpot badge logic
                const g1Prize = draw.results && draw.results.group1_prize;
                const g1FromPrizes = draw.results && draw.results.prizes
                    && (draw.results.prizes.find(p => p.group === 1) || {}).amount;
                const displayG1 = g1Prize || g1FromPrizes;
                const estJackpot = draw.results && draw.results.estimated_jackpot;
                let jackpotBadge = '';
                if (hasResults && displayG1) {
                    jackpotBadge = `<span class="jackpot-badge prize">Grp1: $${displayG1.toLocaleString()}</span>`;
                } else if (!hasResults && estJackpot) {
                    jackpotBadge = `<span class="jackpot-badge est">Min $${estJackpot.toLocaleString()}</span>`;
                }

                return `<div class="draw-card ${i === 0 ? 'open' : ''}" data-idx="${i}">
                    <div class="draw-header" onclick="this.parentElement.classList.toggle('open')">
                        <div class="draw-left">
                            <span class="draw-date">${formatDate(draw.draw_date)}</span>
                            ${draw.draw_number ? `<span class="draw-num">#${draw.draw_number}</span>` : ''}
                            ${hasResults ? `
                                <div class="winning-row">
                                    ${draw.results.winning.map(n => `<span class="ball win">${pad(n)}</span>`).join('')}
                                    ${draw.results.additional != null ? `<span class="plus-sign">+</span><span class="ball bonus-ball">${pad(draw.results.additional)}</span>` : ''}
                                </div>
                            ` : ''}
                        </div>
                        <div class="draw-center">${jackpotBadge}</div>
                        <div class="draw-right">
                            <span class="draw-stats-text">${hasBets ? statsText : ''}</span>
                            ${hasResults && hasPreds ? `<span class="match-count ${predMatchColor}" title="Best prediction match">P${bestPredMatch}</span>` : ''}
                            ${hasResults && hasBets ? `<span class="match-count ${betMatchColor}" title="Best bet match">B${bestBetMatch}</span>` : ''}
                            <span class="chevron">▾</span>
                        </div>
                    </div>
                    <div class="draw-body">
                        ${(hasPreds || hasBets) ? `
                        <div class="draw-columns">
                            ${hasPreds ? renderPredCol(draw) : ''}
                            ${hasBets ? renderBetsCol(draw) : ''}
                            ${hasResults ? renderResultsCol(draw) : ''}
                        </div>` : '<p class="no-data">No predictions or bets for this draw.</p>'}
                    </div>
                </div>`;
            }).join('');
        }

        function renderPrizeSection(draw) {
            const results = draw.results;
            if (!results || !results.prizes || results.prizes.length === 0) return '';
            const jackpot = results.jackpot;
            return `<div class="prize-section">
                <h4>Winning Shares</h4>
                ${jackpot ? `<div class="prize-jackpot">Group 1 Prize: $${jackpot.toLocaleString()}</div>` : ''}
                <table class="prize-table">
                    <tr><th>Group</th><th>Share Amount</th><th>Winners</th></tr>
                    ${results.prizes.map(p => `<tr>
                        <td>${p.group}</td>
                        <td>${p.amount > 0 ? '$' + p.amount.toLocaleString() : '—'}</td>
                        <td>${p.winners > 0 ? p.winners.toLocaleString() : '—'}</td>
                    </tr>`).join('')}
                </table>
            </div>`;
        }

        function renderPredCol(draw) {
            const preds = draw.predictions || [];
            const hasResults = draw.results && draw.results.winning && draw.results.winning.length > 0;
            const winning = hasResults ? draw.results.winning : [];
            const additional = hasResults ? draw.results.additional : null;

            return `<div class="draw-col">
                <h4>Predictions (${preds.length})</h4>
                ${preds.map((set, idx) => {
                    let matchCount = 0;
                    const balls = set.map(n => {
                        let cls = 'ball';
                        if (winning.includes(n)) { cls += ' match'; matchCount++; }
                        else if (n === additional) { cls += ' bonus-match'; }
                        else if (hasResults && isNear(n, winning)) { cls += ' near'; }
                        return `<span class="${cls}">${pad(n)}</span>`;
                    }).join('');
                    return `<div class="line-row">
                        <span class="line-num">${idx + 1}</span>
                        <div class="line-balls">${balls}</div>
                        ${hasResults ? `<span class="line-match">${matchCount > 0 ? matchCount : '—'}</span>` : ''}
                    </div>`;
                }).join('')}
            </div>`;
        }

        function renderBetsCol(draw) {
            const bets = draw.bets || [];
            const hasResults = draw.results && draw.results.winning && draw.results.winning.length > 0;
            const winning = hasResults ? draw.results.winning : [];
            const additional = hasResults ? draw.results.additional : null;

            return `<div class="draw-col">
                <h4>Bets (${bets.length})</h4>
                ${bets.map((bet, idx) => {
                    let matchCount = 0;
                    const balls = bet.numbers.map(n => {
                        let cls = 'ball';
                        if (winning.includes(n)) { cls += ' match'; matchCount++; }
                        else if (n === additional) { cls += ' bonus-match'; }
                        else if (hasResults && isNear(n, winning)) { cls += ' near'; }
                        return `<span class="${cls}">${pad(n)}</span>`;
                    }).join('');
                    return `<div class="line-row">
                        <span class="line-num">${idx + 1}</span>
                        <div class="line-balls">${balls}</div>
                        ${hasResults ? `<span class="line-match">${matchCount > 0 ? matchCount : '—'}</span>` : ''}
                    </div>`;
                }).join('')}
            </div>`;
        }

        function renderResultsCol(draw) {
            const r = draw.results;
            if (!r || !r.prizes || r.prizes.length === 0) return '';
            const prizes = r.prizes;

            return `<div class="results-col">
                <h4>Winning Shares</h4>
                ${prizes.map(p =>
                    `<div class="results-stat">
                        <span class="label">Grp ${p.group}</span>
                        <span class="value">${p.amount > 0 ? '$' + p.amount.toLocaleString() : '—'}</span>
                        <span class="winners">${p.winners > 0 ? p.winners.toLocaleString() : '—'}</span>
                    </div>`
                ).join('')}
            </div>`;
        }

        /* ── AUTH (via backend API) ── */
        let currentUser = null;

        $('adminLoginBtn').onclick = () => { $('loginOverlay').classList.add('show'); $('loginEmail').focus(); };
        $('loginClose').onclick = () => { $('loginOverlay').classList.remove('show'); $('loginError').style.display='none'; };
        $('loginPass').onkeydown = e => { if(e.key==='Enter') $('loginSubmit').click(); };
        $('loginOverlay').onclick = e => { if(e.target===$('loginOverlay')) $('loginClose').click(); };

        $('loginSubmit').onclick = async () => {
            const email = $('loginEmail').value.trim();
            const pass = $('loginPass').value;
            if (!email || !pass) return;
            $('loginSubmit').textContent = 'Signing in...';
            $('loginSubmit').disabled = true;
            try {
                const resp = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass }),
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || 'Login failed');
                currentUser = data.user;
                $('loginOverlay').classList.remove('show');
                $('loginEmail').value = ''; $('loginPass').value = '';
                $('loginError').style.display = 'none';
                showAdmin();
            } catch (err) {
                $('loginError').textContent = err.message;
                $('loginError').style.display = 'block';
            }
            $('loginSubmit').textContent = 'Login';
            $('loginSubmit').disabled = false;
        };

        $('logoutBtn').onclick = () => { currentUser = null; showPublic(); };
        $('backToPublic').onclick = () => showPublic();

        async function showAdmin() {
            $('publicView').style.display = 'none';
            $('adminPanel').classList.add('active');
            $('navRight').innerHTML = `
                <button class="btn-sm btn-ghost" id="navBackBtn">Public View</button>
                <button class="btn-sm btn-logout" id="navLogoutBtn">Logout</button>`;
            $('navBackBtn').onclick = () => showPublic();
            $('navLogoutBtn').onclick = () => { currentUser = null; showPublic(); };
            await renderAdminDrawList();
            resetForm();
        }

        function showPublic() {
            $('adminPanel').classList.remove('active');
            $('publicView').style.display = 'block';
            $('navRight').innerHTML = `<button class="btn-sm btn-admin" id="adminLoginBtn">Admin</button>`;
            $('adminLoginBtn').onclick = () => {
                if (currentUser) showAdmin();
                else { $('loginOverlay').classList.add('show'); $('loginEmail').focus(); }
            };
            renderPublicDraws();
        }

        /* ── ADMIN — Image OCR ── */
        let uploadedFile = null;
        let extractedData = null;
        let editingDrawId = null;

        const uploadZone = $('uploadZone');
        uploadZone.ondragover = e => { e.preventDefault(); uploadZone.classList.add('dragover'); };
        uploadZone.ondragleave = () => uploadZone.classList.remove('dragover');
        uploadZone.ondrop = e => {
            e.preventDefault(); uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleImageFile(e.dataTransfer.files[0]);
        };
        $('betImageInput').onchange = e => { if (e.target.files.length) handleImageFile(e.target.files[0]); };

        function handleImageFile(file) {
            uploadedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                $('previewImg').src = e.target.result;
                $('uploadPreview').style.display = 'block';
                $('extractBetsBtn').style.display = 'inline-flex';
                $('extractedBets').style.display = 'none';
                $('saveDraw').style.display = 'none';
                extractedData = null;
            };
            reader.readAsDataURL(file);
        }

        $('extractBetsBtn').onclick = async () => {
            if (!uploadedFile) return;
            showStatus('ocrStatus', 'loading', 'Extracting bets from image...');
            try {
                const formData = new FormData();
                formData.append('image', uploadedFile);
                const response = await fetch(`${API}/extract-bets`, { method: 'POST', body: formData });
                if (!response.ok) { const err = await response.json(); throw new Error(err.detail || 'Server error'); }
                extractedData = await response.json();
                const bets = extractedData.bets || [];
                renderExtractedInfo();
                renderBetList();
                $('saveDraw').style.display = 'inline-flex';
                showStatus('ocrStatus', 'success', `Extracted ${bets.length} bet(s) successfully!`);
            } catch(err) {
                showStatus('ocrStatus', 'error', `Extraction failed: ${err.message}`);
            }
        };

        /* ── ADMIN — Save / Delete ── */
        $('saveDraw').onclick = async () => {
            if (!extractedData && !editingDrawId) { showStatus('saveStatus', 'error', 'Upload and extract a bet slip first.'); return; }
            showStatus('saveStatus', 'loading', 'Saving draw...');
            const bets = extractedData ? (extractedData.bets || []) : [];
            const drawDate = extractedData ? extractedData.draw_date : null;
            const drawNumber = extractedData ? extractedData.draw_number : null;
            if (!drawDate) { showStatus('saveStatus', 'error', 'Could not determine draw date from the image.'); return; }
            // Merge into existing draw row if one exists for this date
            const allDraws = await fetchDraws();
            const existing = allDraws.find(d => d.draw_date === drawDate);
            const mergedBets = existing ? [...(existing.bets || []), ...bets] : bets;
            const draw = existing
                ? { ...existing, bets: mergedBets, draw_number: drawNumber || existing.draw_number || '' }
                : { draw_date: drawDate, draw_number: drawNumber || '', predictions: [], bets: mergedBets, results: { winning: [], additional: null } };
            if (editingDrawId) draw.id = editingDrawId;
            try {
                await saveDraw(draw);
                showStatus('saveStatus', 'success', 'Draw saved!');
                await renderAdminDrawList();
                setTimeout(() => resetForm(), 1000);
            } catch (err) {
                showStatus('saveStatus', 'error', `Save failed: ${err.message}`);
            }
        };

        $('deleteDraw').onclick = async () => {
            if (!editingDrawId || !confirm('Delete this draw?')) return;
            showStatus('saveStatus', 'loading', 'Deleting...');
            try {
                await deleteDraw(editingDrawId);
                showStatus('saveStatus', 'success', 'Draw deleted');
                await renderAdminDrawList();
                resetForm();
            } catch (err) {
                showStatus('saveStatus', 'error', `Delete failed: ${err.message}`);
            }
        };

        $('clearForm').onclick = () => resetForm();

        function resetForm() {
            editingDrawId = null; uploadedFile = null; extractedData = null;
            $('uploadPreview').style.display = 'none';
            $('extractBetsBtn').style.display = 'none';
            $('extractedBets').style.display = 'none';
            $('saveDraw').style.display = 'none';
            $('deleteDraw').style.display = 'none';
            hideStatus('saveStatus'); hideStatus('ocrStatus');
        }

        function renderExtractedInfo() {
            if (!extractedData) return;
            const d = extractedData;
            $('extractedInfo').innerHTML = `
                <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:.4rem;">
                    <label style="font-size:.82rem;color:var(--text-dim);">Draw Date:
                        <input type="date" value="${d.draw_date || ''}" style="font-weight:700;font-size:.82rem;padding:.15rem .3rem;border:1.5px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;"
                            onchange="extractedData.draw_date=this.value">
                    </label>
                    <label style="font-size:.82rem;color:var(--text-dim);">Draw #:
                        <input type="text" value="${d.draw_number || ''}" style="width:60px;font-weight:700;font-size:.82rem;padding:.15rem .3rem;border:1.5px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;"
                            onchange="extractedData.draw_number=this.value">
                    </label>
                </div>`;
        }

        function renderBetList() {
            const bets = extractedData ? (extractedData.bets || []) : [];
            $('extractedList').innerHTML = bets.map((bet, i) =>
                `<div class="extracted-bet-item" data-idx="${i}">
                    <span class="bet-type-tag">${bet.type}</span>
                    <div class="line-balls">${bet.numbers.map(n => `<span class="ball">${pad(n)}</span>`).join('')}</div>
                    <div class="bet-actions">
                        <button class="bet-btn" onclick="editBet(${i})" title="Edit">&#9998;</button>
                        <button class="bet-btn del" onclick="deleteBet(${i})" title="Delete">&times;</button>
                    </div>
                </div>`
            ).join('');
            $('extractedBets').style.display = bets.length ? 'block' : 'none';
        }

        window.editBet = function(idx) {
            const bet = extractedData.bets[idx];
            const row = document.querySelector(`.extracted-bet-item[data-idx="${idx}"]`);
            const types = ['Ordinary','System 7','System 8','System 9','System 10','System 11','System 12'];
            row.className = 'bet-edit-row';
            row.innerHTML = `
                <select id="editType_${idx}">${types.map(t => `<option${t === bet.type ? ' selected' : ''}>${t}</option>`).join('')}</select>
                ${bet.numbers.map((n, j) => `<input type="number" min="1" max="49" value="${n}" id="editNum_${idx}_${j}">`).join('')}
                <button class="bet-btn save" onclick="saveBetEdit(${idx}, ${bet.numbers.length})">&#10003;</button>
                <button class="bet-btn" onclick="renderBetList()">&#10007;</button>
            `;
        };

        window.saveBetEdit = function(idx, count) {
            const newType = document.getElementById(`editType_${idx}`).value;
            const newNums = [];
            for (let j = 0; j < count; j++) {
                const v = parseInt(document.getElementById(`editNum_${idx}_${j}`).value);
                if (isNaN(v) || v < 1 || v > 49) { alert(`Number ${j+1} must be 1-49`); return; }
                newNums.push(v);
            }
            extractedData.bets[idx] = { type: newType, numbers: newNums };
            renderBetList();
        };

        window.deleteBet = function(idx) {
            extractedData.bets.splice(idx, 1);
            renderBetList();
        };

        function loadDrawIntoForm(draw) {
            editingDrawId = draw.id;
            extractedData = { draw_date: draw.draw_date, draw_number: draw.draw_number, bets: draw.bets || [] };
            renderExtractedInfo();
            renderBetList();
            $('saveDraw').style.display = 'inline-flex';
            $('deleteDraw').style.display = 'inline-flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* ── ADMIN — Fetch Missing Results ── */
        $('fetchAllResults').onclick = async () => {
            showStatus('fetchResultsStatus', 'loading', 'Fetching results...');
            try {
                const res = await fetch(`${API}/fetch-results`, { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showStatus('fetchResultsStatus', 'success', data.message);
                if (data.updated > 0) await renderAdminDrawList();
            } catch(err) {
                showStatus('fetchResultsStatus', 'error', `Failed: ${err.message}`);
            }
        };

        /* ── ADMIN — Draw List ── */
        async function renderAdminDrawList() {
            const draws = await fetchDraws();
            $('adminDrawList').innerHTML = draws.length === 0
                ? '<p class="no-data">No draws yet. Add one above.</p>'
                : draws.map(d => `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border-light);">
                        <div>
                            <strong style="font-family:'JetBrains Mono',monospace;font-size:.85rem;">${formatDate(d.draw_date)}</strong>
                            ${d.draw_number ? `<span style="color:var(--text-muted);font-size:.72rem;margin-left:.5rem;">#${d.draw_number}</span>` : ''}
                            <span style="color:var(--text-muted);font-size:.72rem;margin-left:.5rem;">
                                ${(d.predictions||[]).length}P · ${(d.bets||[]).length}B · ${d.results && d.results.winning && d.results.winning.length ? '✓R' : '—R'}
                            </span>
                        </div>
                        <div style="display:flex;gap:.4rem;">
                            <button class="btn-outline-sm" data-repredict="${d.draw_date}">Re-predict</button>
                            <button class="btn-outline-sm" data-draw-id="${d.id}">Edit</button>
                        </div>
                    </div>
                `).join('');

            $('adminDrawList').querySelectorAll('[data-draw-id]').forEach(btn => {
                btn.onclick = async () => {
                    const draws = await fetchDraws();
                    const draw = draws.find(d => d.id === btn.dataset.drawId);
                    if (draw) loadDrawIntoForm(draw);
                };
            });
            $('adminDrawList').querySelectorAll('[data-repredict]').forEach(btn => {
                btn.onclick = async () => {
                    const dd = btn.dataset.repredict;
                    btn.textContent = '...';
                    btn.disabled = true;
                    try {
                        const res = await fetch(`${API}/regenerate-predictions/${dd}`, { method: 'POST' });
                        if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Failed'); }
                        const data = await res.json();
                        btn.textContent = `+${data.new}`;
                        await renderAdminDrawList();
                    } catch(e) {
                        btn.textContent = 'Failed';
                        setTimeout(() => { btn.textContent = 'Re-predict'; btn.disabled = false; }, 2000);
                    }
                };
            });
        }

        /* ── INIT ── */
        renderPublicDraws();
    })();
    </script>
</body>
</html>
